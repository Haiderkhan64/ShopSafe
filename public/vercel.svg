<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
<!-- Definitions -->
<defs>
<linearGradient id="purpleGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#674ea7"/>
<stop offset="100%" stop-color="#574095"/>
</linearGradient>
</defs>
<!-- Background -->
<rect fill="none" height="300" rx="10" width="500" x="0" y="0"/>
<!-- Simple Shopping Bag Outline -->
<path d="M170 130 L170 190 C170 200 180 200 180 200 L320 200 C320 200 330 200 330 190 L330 130" fill="none" stroke="#574095" stroke-linecap="round" stroke-width="10"/>
